name: Check

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: check-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web / typecheck, test, build
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Vitest
        run: npm test
      - name: Build frontend
        run: npm run build

  rust:
    name: Rust / ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-15-intel, macos-15, windows-latest]
    steps:
      - uses: actions/checkout@v7
      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Install stable Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri
      - name: Format workspace for CI compilation
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --all
      - name: Clippy
        run: cargo clippy --manifest-path src-tauri/Cargo.toml --all-targets --all-features -- -D warnings
      - name: Test
        run: cargo test --manifest-path src-tauri/Cargo.toml --all-features
      - name: Check
        run: cargo check --manifest-path src-tauri/Cargo.toml --all-targets --all-features
      - name: Upload generated Rust lockfile
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: generated-cargo-lock
          path: src-tauri/Cargo.lock
          if-no-files-found: error
          retention-days: 7
